services:
  - type: web
    name: bi-backend
    env: python
    buildCommand: "pip install -r requirements-backend.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: true
      - key: OPENAI_API_KEY
        sync: true
      - key: PYTHON_VERSION
        value: 3.11.0
        
  - type: web
    name: bi-frontend
    env: python
    buildCommand: "pip install -r requirements-frontend.txt"
    startCommand: "streamlit run app.py --server.port $PORT --server.address 0.0.0.0"
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: bi-backend
          property: host
      - key: PYTHON_VERSION
        value: 3.11.0
